<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recibo ADPERUS 2025</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <main>
    <header>
      <h2>RECIBO ADPERUS 2025</h2>
    </header>

    <form>
      <label for="departamento">Departamento:</label>
      <input type="text" id="departamento" name="departamento" required>

      <label for="congregation">Congregação:</label>
      <select id="congregation" name="congregation" required>
        <option value="">Selecione...</option>
        <option value="0335-RENASCER-SEDE">0335-RENASCER-SEDE</option>
        <!-- demais opções -->
      </select>

      <label for="valor_numerico">Valor R$:</label>
      <input type="number" id="valor_numerico" name="valor_numerico" step="0.01" required>

      <label for="valor_extenso">Valor por extenso:</label>
      <input type="text" id="valor_extenso" name="valor_extenso" required>

      <label for="referente">Referente:</label>
      <input type="text" id="referente" name="referente" required>

      <label for="pagamento">Forma de Pagamento:</label>
      <select id="pagamento" name="pagamento" required>
        <option value="">Selecione...</option>
        <option value="dinheiro">Dinheiro</option>
        <option value="pix">Pix</option>
        <option value="cartao">Cartão</option>
      </select>

      <label for="data">Data:</label>
      <input type="date" id="data" name="data" required>
    </form>

    <footer>
      <h3>THIAGO SILVA VIEIRA</h3>
      <h3>TESOURARIA ESTADUAL MT</h3>
    </footer>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(() => console.log("Service Worker registrado"));
    }
  </script>
</body>
</html>
